<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grade 12 Advanced Chemistry Mock Exam</title>
<style>
:root { --bg:#f4f7fb; --card:#ffffff; --text:#152033; --muted:#637083; --primary:#1b5f9e; --accent:#e8f1fb; --danger:#b42318; --ok:#067647; }
* { box-sizing:border-box; } body { margin:0; font-family: Arial, sans-serif; background:linear-gradient(135deg,#edf4fb,#f9fbfd); color:var(--text); }
header { background:#0f3d63; color:white; padding:28px 18px; text-align:center; }
header h1 { margin:0 0 8px; font-size:28px; } header p { margin:4px 0; opacity:.92; }
.wrap { max-width:1050px; margin:24px auto; padding:0 16px 40px; }
.card { background:var(--card); border:1px solid #dbe5ef; border-radius:18px; padding:20px; box-shadow:0 10px 30px rgba(15,61,99,.08); margin-bottom:18px; }
.controls { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:12px; align-items:end; }
label { font-weight:700; display:block; margin-bottom:6px; } input, select { width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:10px; font-size:15px; }
button { border:0; border-radius:12px; padding:12px 18px; background:var(--primary); color:white; font-weight:700; cursor:pointer; } button.secondary { background:#475569; } button:disabled { opacity:.55; cursor:not-allowed; }
.meta { display:flex; gap:12px; flex-wrap:wrap; margin-top:14px; } .pill { background:var(--accent); color:#16466e; padding:8px 12px; border-radius:999px; font-weight:700; }
.q { border-top:1px solid #e5edf5; padding-top:18px; margin-top:18px; } .q h3 { margin:0 0 12px; font-size:18px; }
.options { display:grid; gap:10px; } .option { display:flex; gap:10px; border:1px solid #dbe5ef; border-radius:12px; padding:12px; cursor:pointer; background:#fff; }
.option:hover { background:#f8fbff; } .option input { width:auto; margin-top:3px; }
.result { font-size:20px; font-weight:800; } .correct { color:var(--ok); } .wrong { color:var(--danger); }
.review-item { padding:10px 0; border-top:1px solid #e5e7eb; }
.hidden { display:none; } .small { color:var(--muted); font-size:13px; }
@media print { .no-print { display:none; } body { background:white; } .card { box-shadow:none; } }
</style>
</head>
<body>
<header>
<h1>Grade 12 Advanced Chemistry Mock Exam</h1>
<p>Organic Chemistry: Alcohols, Ethers, Amines, Aldehydes, Ketones, Carboxylic Acids, and Esters</p>
<p>30 MCQ | Medium to High Level | Auto Scoring</p>
</header>
<div class="wrap">
<section class="card no-print" id="setup">
<div class="controls">
<div><label>Student Name</label><input id="studentName" placeholder="Type student name"></div>
<div><label>Class</label><input id="studentClass" placeholder="Example: 12A"></div>
<div><label>Choose Form</label><select id="formSelect"><option value="A">Form A</option><option value="B">Form B</option></select></div>
<div><button onclick="startExam()">Start Exam</button></div>
</div>
</section>
<section class="card hidden" id="examCard">
<h2 id="examTitle">Mock Exam</h2>
<div class="meta"><span class="pill" id="studentBadge"></span><span class="pill">30 Questions</span><span class="pill">120 minutes</span><span class="pill">Calculator Allowed</span></div>
<form id="examForm"></form>
<div class="no-print" style="margin-top:22px; display:flex; gap:10px; flex-wrap:wrap;"><button onclick="submitExam()">Submit Answers</button><button class="secondary" onclick="resetExam()" type="button">Reset</button></div>
</section>
<section class="card hidden" id="resultCard">
<h2>Result</h2>
<div class="result" id="scoreText"></div>
<p id="feedback"></p>
<div id="review"></div>
<div class="no-print" style="margin-top:18px;"><button onclick="window.print()">Print Result</button></div>
</section>
</div>
<script>
const FORMS = {"A": [{"outcome": "Alcohol definition / properties", "q": "Which statement best defines an alcohol in organic chemistry?", "opts": ["A hydrocarbon in which at least one hydrogen atom is replaced by a hydroxyl group bonded to a saturated carbon", "A compound containing an oxygen atom bonded between two carbon groups", "A compound containing a carbonyl group at the end of a carbon chain", "A compound that releases hydroxide ions completely in water"], "ans": 0, "answer": 0}, {"outcome": "Methanol and ethanol uses/properties", "q": "Methanol and ethanol are both flammable liquids. Which comparison is chemically correct?", "opts": ["Ethanol is more toxic than methanol because it produces formaldehyde in the liver faster", "Methanol has the formula C2H5OH, while ethanol has the formula CH3OH", "Both are nonpolar and therefore insoluble in water", "Methanol is commonly used as an industrial solvent and fuel component, while ethanol is used in alcoholic beverages and disinfectants"], "ans": 3, "answer": 3}, {"outcome": "Alcohol physical properties", "q": "Ethanol dissolves completely in water mainly because ethanol molecules can:", "opts": ["produce ions by complete dissociation", "react with water to form an ether", "form hydrogen bonds with water molecules through the -OH group", "break covalent bonds in water molecules"], "ans": 2, "answer": 2}, {"outcome": "Water and alcohol comparison", "q": "Compared with propane, ethanol has a much higher boiling point mainly because ethanol has:", "opts": ["a symmetrical nonpolar structure", "hydrogen bonding between molecules", "a lower molar mass", "only London dispersion forces"], "ans": 1, "answer": 1}, {"outcome": "Alcohol uses", "q": "Which use is most directly related to the ability of ethanol to dissolve many organic substances and evaporate readily?", "opts": ["Reactant in neutralization of strong acids", "Oxidizing agent in metal extraction", "Electrolyte in dry cells", "Solvent in perfumes and hand sanitizers"], "ans": 3, "answer": 3}, {"outcome": "IUPAC naming alcohols", "q": "What is the correct IUPAC name for CH3CH2CH(OH)CH3?", "opts": ["2-methylpropan-1-ol", "butanal", "butan-2-ol", "butan-3-ol"], "ans": 2, "answer": 2}, {"outcome": "Structure from alcohol name", "q": "Which condensed structural formula represents 2-methylpropan-2-ol?", "opts": ["(CH3)3COH", "CH3CH2CH2CH2OH", "CH3CH(OH)CH2CH3", "CH3OCH2CH3"], "ans": 0, "answer": 0}, {"outcome": "IUPAC naming alcohols", "q": "A four-carbon chain contains an -OH group on carbon 1 and a methyl group on carbon 2. What is the correct name?", "opts": ["pentan-2-ol", "2-methylbutan-1-ol", "3-methylbutan-1-ol", "2-methylpropan-1-ol"], "ans": 1, "answer": 1}, {"outcome": "Ether definition", "q": "Which formula represents an ether?", "opts": ["CH3CH2OH", "CH3CHO", "CH3COOH", "CH3OCH3"], "ans": 3, "answer": 3}, {"outcome": "Ether vs alcohol properties", "q": "Dimethyl ether and ethanol have the same molecular formula, C2H6O. Ethanol has a higher boiling point because ethanol molecules:", "opts": ["are less polar than dimethyl ether molecules", "contain fewer electrons than dimethyl ether molecules", "can hydrogen bond with each other, while dimethyl ether molecules cannot donate hydrogen bonds", "have weaker intermolecular forces than ether molecules"], "ans": 2, "answer": 2}, {"outcome": "Symmetrical/asymmetrical ethers", "q": "Which compound is an asymmetrical ether?", "opts": ["CH3OCH2CH3", "CH3OCH3", "CH3CH2OCH2CH3", "C6H5OC6H5"], "ans": 0, "answer": 0}, {"outcome": "Structure from ether name", "q": "Which condensed formula corresponds to ethoxypropane?", "opts": ["CH3OCH2CH2CH3", "CH3CH2CH2OH", "CH3CH2COOCH3", "CH3CH2OCH2CH2CH3"], "ans": 3, "answer": 3}, {"outcome": "Amine definition/classification", "q": "Which compound is a tertiary amine?", "opts": ["CH3NHCH3", "NH3", "N(CH3)3", "CH3NH2"], "ans": 2, "answer": 2}, {"outcome": "Amines daily uses", "q": "Amines are important in daily life because many of them are found in:", "opts": ["ionic salts that contain no carbon", "medicines, dyes, and biological molecules", "inert noble gases used in lighting", "metallic alloys used in construction"], "ans": 1, "answer": 1}, {"outcome": "Carbonyl identification", "q": "Which functional group is present in aldehydes and ketones?", "opts": ["-OH", "C-O-C", "-NH2", "C=O"], "ans": 3, "answer": 3}, {"outcome": "Families with carbonyl compounds", "q": "Which pair both contains a carbonyl group?", "opts": ["methylamine and ethanol", "methanol and methoxyethane", "ethanal and propanone", "ethanol and ethoxyethane"], "ans": 2, "answer": 2}, {"outcome": "Aldehyde structure from formula/name", "q": "Which formula represents propanal?", "opts": ["CH3CH2CHO", "CH3COCH3", "CH3CH2COOH", "CH3CH2CH2OH"], "ans": 0, "answer": 0}, {"outcome": "IUPAC naming aldehydes", "q": "What is the IUPAC name of CH3CH2CH2CHO?", "opts": ["butan-1-ol", "butanal", "butanone", "butanoic acid"], "ans": 1, "answer": 1}, {"outcome": "Aldehyde vs alcohol properties", "q": "For compounds with similar molar mass, alcohols usually have higher boiling points than aldehydes because alcohols:", "opts": ["have no polar bonds", "are always ionic", "contain carbonyl groups", "form intermolecular hydrogen bonds"], "ans": 3, "answer": 3}, {"outcome": "Aldehyde uses", "q": "Which use is commonly associated with aldehydes such as formaldehyde?", "opts": ["fuel for nuclear reactors", "raising agent in bread by releasing carbon dioxide", "preservatives and manufacturing resins", "main component of table salt"], "ans": 2, "answer": 2}, {"outcome": "Aldehydes vs ketones", "q": "Which statement correctly distinguishes an aldehyde from a ketone?", "opts": ["An aldehyde has the carbonyl carbon at the end of a chain; a ketone has it within the chain", "A ketone must contain an -OH group; an aldehyde cannot contain oxygen", "An aldehyde has nitrogen; a ketone has sulfur", "A ketone always has fewer carbon atoms than the corresponding aldehyde"], "ans": 0, "answer": 0}, {"outcome": "IUPAC naming ketones", "q": "What is the IUPAC name of CH3COCH2CH3?", "opts": ["butanal", "butan-1-one", "propanone", "butan-2-one"], "ans": 3, "answer": 3}, {"outcome": "IUPAC naming ketones", "q": "Which structure is correctly named pentan-3-one?", "opts": ["CH3CH2CH2CH2CHO", "CH3CH2CH2COOH", "CH3CH2COCH2CH3", "CH3COCH2CH2CH3"], "ans": 2, "answer": 2}, {"outcome": "Carboxylic acid definition/acidity", "q": "Ethanoic acid is classified as an acid because it can:", "opts": ["form only nonpolar molecules in solution", "donate H+ from the -COOH group to water", "accept electrons from oxygen to form an ether", "release OH- completely in water"], "ans": 1, "answer": 1}, {"outcome": "Carboxylic acid equation", "q": "Which equation best represents the acidic behavior of ethanoic acid in water?", "opts": ["CH3COOH + H2O -> CH3CH3 + O2", "CH3COOH -> CH3OCH3 + H2", "CH3COOH + NaCl -> CH3Cl + NaOH", "CH3COOH + H2O ⇌ CH3COO- + H3O+"], "ans": 3, "answer": 3}, {"outcome": "IUPAC naming carboxylic acids", "q": "What is the correct IUPAC name for CH3CH2COOH?", "opts": ["propanone", "propan-1-ol", "propanoic acid", "propanal"], "ans": 2, "answer": 2}, {"outcome": "Ester definition / uses", "q": "Which statement describes an ester?", "opts": ["An organic compound containing the -COO- group, often associated with fruity odors", "A compound containing only carbon and hydrogen", "A compound with nitrogen bonded to three hydrogen atoms", "A compound in which oxygen is absent"], "ans": 0, "answer": 0}, {"outcome": "Ester structure from name", "q": "Which condensed formula represents methyl ethanoate?", "opts": ["CH3CH2CHO", "CH3COOCH3", "CH3CH2COOH", "CH3OCH3"], "ans": 1, "answer": 1}, {"outcome": "Functional group recognition", "q": "A compound has the general structure RCOOR'. To which family does it belong?", "opts": ["aldehydes", "amines", "alcohols", "esters"], "ans": 3, "answer": 3}, {"outcome": "Integrated organic reasoning", "q": "A liquid is miscible with water, has a relatively high boiling point for its molar mass, and gives the IUPAC suffix -ol. Which functional group is most likely present?", "opts": ["ether linkage only", "amine group only", "hydroxyl group", "carbonyl group only"], "ans": 2, "answer": 2}], "B": [{"outcome": "Alcohol definition / properties", "q": "Which compound is classified as an alcohol?", "opts": ["CH3CH2CH2OH", "CH3CH2OCH3", "CH3COCH3", "CH3COOCH3"], "ans": 0, "answer": 0}, {"outcome": "Methanol and ethanol properties/uses", "q": "Why must methanol be handled more cautiously than ethanol in laboratory and industrial contexts?", "opts": ["Methanol is a noble gas under room conditions", "Methanol is nonflammable, so it accumulates unnoticed", "Methanol cannot dissolve in water, so it floats as a solid layer", "Methanol is highly toxic and can cause severe poisoning even in small amounts"], "ans": 3, "answer": 3}, {"outcome": "Alcohol physical properties", "q": "As the hydrocarbon chain of an alcohol becomes longer, its solubility in water generally decreases because:", "opts": ["hydrogen bonding becomes impossible for all alcohols", "the molecule becomes ionic", "the nonpolar carbon chain becomes a larger part of the molecule", "the -OH group disappears from the molecule"], "ans": 2, "answer": 2}, {"outcome": "Water and alcohol comparison", "q": "Water has a higher boiling point than methanol even though methanol has a larger molar mass. The best explanation is that water:", "opts": ["cannot form hydrogen bonds", "forms a more extensive hydrogen-bond network", "has only London dispersion forces", "is less polar than methanol"], "ans": 1, "answer": 1}, {"outcome": "Alcohol uses", "q": "Which property makes ethanol suitable as a disinfectant ingredient?", "opts": ["It is a strong base that fully ionizes", "It is completely inert toward biological materials", "It is a metal catalyst", "It can interact with water and organic components and evaporates readily"], "ans": 3, "answer": 3}, {"outcome": "IUPAC naming alcohols", "q": "What is the correct IUPAC name for CH3CH(CH3)CH2OH?", "opts": ["butan-2-ol", "propan-2-ol", "2-methylpropan-1-ol", "2-methylpropan-2-ol"], "ans": 2, "answer": 2}, {"outcome": "Structure from alcohol name", "q": "Which formula represents pentan-2-ol?", "opts": ["CH3CH(OH)CH2CH2CH3", "CH3CH2CH2CH2CH2OH", "CH3COCH2CH2CH3", "CH3CH2OCH2CH3"], "ans": 0, "answer": 0}, {"outcome": "IUPAC naming alcohols", "q": "Which name is correct for CH3CH2CH2CH2OH?", "opts": ["butanoic acid", "butan-1-ol", "butan-2-ol", "butanal"], "ans": 1, "answer": 1}, {"outcome": "Ether definition", "q": "An ether contains which bonding pattern?", "opts": ["R-COOH", "R-CHO", "R-NH2", "R-O-R'"], "ans": 3, "answer": 3}, {"outcome": "Ether vs alcohol properties", "q": "Compared with an alcohol of similar molar mass, an ether is usually more volatile because the ether:", "opts": ["contains no covalent bonds", "always has a higher molecular mass", "cannot form hydrogen bonds with itself as an H-bond donor", "has a stronger ionic lattice"], "ans": 2, "answer": 2}, {"outcome": "Symmetrical/asymmetrical ethers", "q": "Which is a symmetrical ether?", "opts": ["CH3CH2OCH2CH3", "CH3OCH2CH3", "CH3OCH2CH2CH3", "CH3CH2OCH3"], "ans": 0, "answer": 0}, {"outcome": "Structure from ether name", "q": "Methoxyethane is represented by:", "opts": ["CH3CH2OH", "CH3COCH3", "CH3COOCH3", "CH3OCH2CH3"], "ans": 3, "answer": 3}, {"outcome": "Amine definition/classification", "q": "Which compound is a secondary amine?", "opts": ["N(CH3)3", "CH3OH", "CH3NHCH2CH3", "CH3NH2"], "ans": 2, "answer": 2}, {"outcome": "Amines daily uses", "q": "The basic behavior of many amines is mainly related to:", "opts": ["complete dissociation into H+ ions", "the lone pair of electrons on nitrogen", "the absence of nitrogen", "a carbonyl group at the chain end"], "ans": 1, "answer": 1}, {"outcome": "Carbonyl identification", "q": "Which compound contains a carbonyl group but is not an aldehyde?", "opts": ["ethanal", "ethanol", "ethoxyethane", "propanone"], "ans": 3, "answer": 3}, {"outcome": "Families with carbonyl compounds", "q": "Which family has the general functional group -COOH?", "opts": ["ethers", "amines", "carboxylic acids", "ketones"], "ans": 2, "answer": 2}, {"outcome": "Aldehyde structure from formula/name", "q": "Which compound is ethanal?", "opts": ["CH3CHO", "CH3CH2OH", "CH3COCH3", "HCOOCH3"], "ans": 0, "answer": 0}, {"outcome": "IUPAC naming aldehydes", "q": "What is the correct IUPAC name of CH3CH(CH3)CHO?", "opts": ["2-methylpropan-1-ol", "2-methylpropanal", "3-methylpropanal", "butan-2-one"], "ans": 1, "answer": 1}, {"outcome": "Aldehyde vs alcohol properties", "q": "Butan-1-ol is more soluble in water than butanal mainly because butan-1-ol:", "opts": ["contains no polar bonds", "has a carbonyl group at the end", "is a symmetrical ether", "can donate and accept hydrogen bonds through the -OH group"], "ans": 3, "answer": 3}, {"outcome": "Aldehyde uses", "q": "Which statement is most appropriate for aldehydes in everyday products?", "opts": ["Aldehydes are metals used in electrical wires", "Aldehydes contain no oxygen atoms", "Some aldehydes contribute to fragrances and flavor compounds, while others are used in manufacturing", "All aldehydes are safe food additives in unlimited amounts"], "ans": 2, "answer": 2}, {"outcome": "Aldehydes vs ketones", "q": "Which compound can be oxidized from a primary alcohol and contains a terminal carbonyl group?", "opts": ["aldehyde", "ketone", "ether", "amine"], "ans": 0, "answer": 0}, {"outcome": "IUPAC naming ketones", "q": "What is the correct IUPAC name for CH3CH2COCH2CH2CH3?", "opts": ["hexan-4-one", "heptan-3-one", "pentan-2-one", "hexan-3-one"], "ans": 3, "answer": 3}, {"outcome": "IUPAC naming ketones", "q": "Which formula represents butan-2-one?", "opts": ["CH3CH2COOH", "CH3CH2CH2OH", "CH3COCH2CH3", "CH3CH2CH2CHO"], "ans": 2, "answer": 2}, {"outcome": "Carboxylic acid definition/acidity", "q": "Which functional group gives carboxylic acids their acidic character?", "opts": ["-NH2", "-COOH", "-OH only in an alcohol", "C-O-C"], "ans": 1, "answer": 1}, {"outcome": "Carboxylic acid equation", "q": "When propanoic acid acts as an acid in water, the organic product is mainly:", "opts": ["CH3CH2OH", "CH3CH2CHO", "CH3OCH3", "CH3CH2COO-"], "ans": 3, "answer": 3}, {"outcome": "IUPAC naming carboxylic acids", "q": "What is the correct IUPAC name of CH3CH2CH2COOH?", "opts": ["butanone", "butyl ethanoate", "butanoic acid", "butanal"], "ans": 2, "answer": 2}, {"outcome": "Ester definition / uses", "q": "Many esters are used in flavorings and perfumes because they often have:", "opts": ["pleasant fruity odors", "very high ionic conductivity", "strong basicity from nitrogen", "no covalent bonds"], "ans": 0, "answer": 0}, {"outcome": "Ester structure from name", "q": "Ethyl methanoate has which condensed structure?", "opts": ["CH3CH2OCH3", "HCOOCH2CH3", "CH3COOCH3", "CH3CH2COOH"], "ans": 1, "answer": 1}, {"outcome": "Functional group recognition", "q": "Which formula belongs to an ester rather than a carboxylic acid?", "opts": ["CH3CH2COOH", "CH3CH2CHO", "CH3CH2OH", "CH3CH2COOCH3"], "ans": 3, "answer": 3}, {"outcome": "Integrated organic reasoning", "q": "An unknown compound has a carbonyl group, does not have an H atom bonded to the carbonyl carbon, and is named with the suffix -one. It is a:", "opts": ["alcohol", "ether", "ketone", "aldehyde"], "ans": 2, "answer": 2}]};
const letters = ['A','B','C','D']; let currentForm = 'A';
function startExam() {
  currentForm = document.getElementById('formSelect').value;
  const name = document.getElementById('studentName').value.trim() || 'Student';
  const cls = document.getElementById('studentClass').value.trim() || '-';
  document.getElementById('studentBadge').textContent = name + ' | Class: ' + cls + ' | Form ' + currentForm;
  document.getElementById('examTitle').textContent = 'Grade 12 Advanced Chemistry Mock Exam - Form ' + currentForm;
  renderQuestions(); document.getElementById('examCard').classList.remove('hidden'); document.getElementById('resultCard').classList.add('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}
function renderQuestions() {
  const form = document.getElementById('examForm'); form.innerHTML='';
  FORMS[currentForm].forEach((q, i) => {
    const box = document.createElement('div'); box.className='q';
    box.innerHTML = `<h3>${i+1}. ${q.q}</h3><div class="options">${q.opts.map((op,j)=>`<label class="option"><input type="radio" name="q${i}" value="${j}"><span><b>${letters[j]}.</b> ${op}</span></label>`).join('')}</div>`;
    form.appendChild(box);
  });
}
function submitExam() {
  const qs = FORMS[currentForm]; let score=0; let unanswered=[]; let review='';
  qs.forEach((q,i)=>{
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if(!selected) unanswered.push(i+1);
    const val = selected ? Number(selected.value) : -1;
    const ok = val === q.answer; if(ok) score++;
    review += `<div class="review-item"><b>Q${i+1}:</b> <span class="${ok?'correct':'wrong'}">${ok?'Correct':'Incorrect'}</span><br><span class="small">Correct answer: ${letters[q.answer]}. ${q.opts[q.answer]}</span></div>`;
  });
  if(unanswered.length) { const proceed = confirm('Unanswered questions: '+unanswered.join(', ')+'. Submit anyway?'); if(!proceed) return; }
  const percent = Math.round(score/qs.length*100);
  document.getElementById('scoreText').textContent = `${score} / ${qs.length} (${percent}%)`;
  document.getElementById('feedback').textContent = percent>=85 ? 'Excellent performance.' : percent>=70 ? 'Good performance. Review the incorrect items.' : 'Needs more revision before the final exam.';
  document.getElementById('review').innerHTML = review;
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}
function resetExam() { renderQuestions(); document.getElementById('resultCard').classList.add('hidden'); }
</script>
</body>
</html>
